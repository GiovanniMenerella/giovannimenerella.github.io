<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Portfolio</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    background: #000;
    overflow-x: hidden;
}

/* container generico */

#pdf-container {
    width: 100%;
    margin: 0;
    padding: 10px 0;
    box-sizing: border-box;
}

/* canvas portfolio */

canvas {
    display: block;
    width: 100%;
    height: auto;
    margin: 0 0 20px 0;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    background: transparent;
}

/* loading pdf */

#loading-frame{
    width:100%;
    height:100vh;
    border:none;
}

/* responsive */

@media (max-width:768px){

#pdf-container{
padding:5px;
}

canvas{
margin-bottom:10px;
}

}

</style>

</head>

<body>

<!-- pagina loading -->

<iframe id="loading-frame" src="loading.pdf"></iframe>

<!-- portfolio -->

<div id="pdf-container" style="display:none;"></div>

<script>

const url = "Portfolio.pdf";

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const container = document.getElementById("pdf-container");
const loadingFrame = document.getElementById("loading-frame");

pdfjsLib.getDocument(url).promise.then(pdf => {

loadingFrame.style.display = "none";
container.style.display = "block";

for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {

pdf.getPage(pageNumber).then(page => {

const scale = window.innerWidth < 768 ? 2.2 : 3;

const viewport = page.getViewport({ scale: scale });

const canvas = document.createElement("canvas");

const context = canvas.getContext("2d");

canvas.height = viewport.height;
canvas.width = viewport.width;

container.appendChild(canvas);

page.render({
canvasContext: context,
viewport: viewport
});

});

}

});

</script>

</body>
</html>
