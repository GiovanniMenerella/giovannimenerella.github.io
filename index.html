<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Portfolio</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
/* --- Corpo della pagina --- */
body, html {
    margin:0;
    padding:0;
    width:100%;
    background:#000;       /* sfondo nero */
    overflow-x:hidden;     /* niente scroll laterale */
}

/* --- Loader (logo) con animazione --- */
#loader {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1000;
    background: #000;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    
    opacity: 0;             /* inizialmente invisibile */
    transition: opacity 0.5s ease; /* transizione morbida */
}
#loader.show {
    opacity: 1;
}
#loader.hide {
    opacity: 0;
}

/* --- Contenitore PDF --- */
#pdf-container{
    width:100%;
    margin:0;
    padding:10px 0;
    box-sizing:border-box;
}

/* --- Canvas PDF --- */
canvas {
    display:block;
    width:100%;
    height:auto;
    margin:0 0 20px 0;       /* margine verticale tra le pagine */
    border-radius:8px;        /* angoli arrotondati */
    box-shadow:0 4px 15px rgba(0,0,0,0.6); /* leggera ombra */
    background: transparent;
    box-sizing:border-box;
}

/* --- Media query per smartphone --- */
@media (max-width:768px){
    #pdf-container{
        padding:5px 0;
    }
    canvas{
        margin-bottom:15px;
    }
}
</style>

</head>

<body>

<!-- Logo di caricamento -->
<div id="loader" class="show">
    <img src="logo.png" alt="Logo personale" style="width:150px;">
</div>

<!-- Contenitore PDF -->
<div id="pdf-container"></div>

<script>
const url = "Portfolio.pdf";
const loader = document.getElementById("loader");

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const container = document.getElementById("pdf-container");

// Mostra il logo subito
loader.classList.add("show");

pdfjsLib.getDocument(url).promise.then(pdf => {

    let loadedPages = 0;

    for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
        pdf.getPage(pageNumber).then(page => {

            const ratio = window.devicePixelRatio || 1;
            const scale = window.innerWidth < 768 ? 2.2 : 3;
            const viewport = page.getViewport({ scale: scale * ratio });

            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");

            canvas.width = viewport.width;
            canvas.height = viewport.height;
            canvas.style.width = (viewport.width / ratio) + "px";
            canvas.style.height = (viewport.height / ratio) + "px";

            container.appendChild(canvas);

            page.render({
                canvasContext: context,
                viewport: viewport
            }).promise.then(() => {
                loadedPages++;
                if(loadedPages === pdf.numPages){
                    // Fade-out del logo quando tutte le pagine sono caricate
                    loader.classList.remove("show");
                    loader.classList.add("hide");
                    setTimeout(() => { loader.style.display = "none"; }, 500);
                }
            });

        });
    }

});
</script>

</body>
</html>
