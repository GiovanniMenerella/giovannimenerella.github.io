<!DOCTYPE html>
<html lang="it" style="background:#000;">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Portfolio</title>

<style>

body, html {
margin:0;
padding:0;
width:100%;
background:#000;
overflow-x:hidden;
}

/* LOADER */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
color:white;
font-family:sans-serif;
}

#loader-text{
margin-bottom:15px;
font-size:18px;
}

#progress-bar{
width:70%;
height:8px;
background:#222;
border-radius:10px;
overflow:hidden;
}

#progress{
width:0%;
height:100%;
background:white;
transition:width 0.2s;
}

/* PDF */

#pdf-container{
width:100%;
margin:0;
padding:10px 0;
box-sizing:border-box;
}

canvas{
display:block;
width:100%;
height:auto;
margin:0 0 20px 0;
border-radius:8px;
box-shadow:0 4px 15px rgba(0,0,0,0.6);
background:transparent;
}

@media (max-width:768px){

#pdf-container{
padding:5px;
}

canvas{
margin-bottom:10px;
}

}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

</head>

<body>

<div id="loader">
<div id="loader-text">Caricamento...</div>
<div id="progress-bar">
<div id="progress"></div>
</div>
</div>

<div id="pdf-container"></div>

<script>

const url = "Portfolio.pdf";

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const container = document.getElementById("pdf-container");

/* PROGRESSO FAKE */

let fakeProgress = 0;

const fakeLoader = setInterval(()=>{

if(fakeProgress < 90){

fakeProgress += 1;

document.getElementById("progress").style.width = fakeProgress + "%";

document.getElementById("loader-text").textContent =
"Caricamento " + fakeProgress + "%";

}

},80);

/* CARICAMENTO PDF */

const loadingTask = pdfjsLib.getDocument(url);

loadingTask.onProgress = function(progressData){

if(progressData.total){

clearInterval(fakeLoader);

const percent = Math.round((progressData.loaded/progressData.total)*100);

document.getElementById("progress").style.width = percent+"%";

document.getElementById("loader-text").textContent =
"Caricamento "+percent+"%";

}

};

loadingTask.promise.then(pdf=>{

document.getElementById("progress").style.width="100%";
document.getElementById("loader-text").textContent="Caricamento completato";

setTimeout(()=>{
document.getElementById("loader").style.display="none";
},300);

for(let pageNumber=1; pageNumber<=pdf.numPages; pageNumber++){

pdf.getPage(pageNumber).then(page=>{

const scale = window.innerWidth < 768 ? 2.2 : 3;

const viewport = page.getViewport({scale:scale});

const canvas=document.createElement("canvas");
const context=canvas.getContext("2d");

canvas.height=viewport.height;
canvas.width=viewport.width;

container.appendChild(canvas);

page.render({
canvasContext:context,
viewport:viewport
});

});

}

});

</script>

</body>
</html>
